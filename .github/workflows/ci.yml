name: CI

# Mirrors the local quality gate (README "Test & quality gate") so the same
# checks that pass locally are enforced on every push and pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    name: Format, analyze, test
    runs-on: macos-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Resolve workspace dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (zero warnings)
        run: flutter analyze

      - name: Run tests
        # `flutter test` at a workspace root does not fan out to members, so the
        # member packages are listed explicitly.
        run: flutter test packages/jet_print apps/jet_print_tester
