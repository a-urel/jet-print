name: jet_print_workspace
description: >-
  Workspace root for jet-print: a publishable Flutter widget library
  (packages/jet_print) and a macOS playground app (apps/jet_print_playground) that
  consumes it exactly as an external consumer would. Resolution happens once
  here, producing a single shared pubspec.lock.
publish_to: none

environment:
  sdk: ^3.6.0

# Dart pub workspace (stable since Dart 3.6). Every member declares
# `resolution: workspace`; this list enumerates them so one `pub get` resolves
# the whole repo into one root pubspec.lock (FR-006a / SC-002).
workspace:
  - packages/jet_print
  - apps/jet_print_playground
