name: jet_print
description: >-
  A layered, theme-aware Flutter library for building WYSIWYG report designers:
  a reified report model, a render/paginate engine, PDF/PNG export and system
  printing, and an interactive shadcn_ui-themed designer surface.
version: 0.1.0

# pub.dev metadata (Epic 1 — release hygiene). Version stays 0.1.0 until the
# 1.0 API freeze (Epic 6). Topics: lowercase, no spaces, <=5.
repository: https://github.com/a-urel/jet-print
homepage: https://github.com/a-urel/jet-print
issue_tracker: https://github.com/a-urel/jet-print/issues
topics:
  - report
  - pdf
  - wysiwyg
  - designer
  - printing

# This package is a member of the jet_print workspace; resolution is performed
# once at the workspace root, producing a single shared pubspec.lock.
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ">=3.6.0"

dependencies:
  flutter:
    sdk: flutter
  # First-party localization support: flutter_localizations provides the Global*
  # delegates and locale-resolution machinery; intl backs the gen-l10n output.
  # Required by FR-016–FR-018 (the library ships its own en/de/tr chrome strings).
  flutter_localizations:
    sdk: flutter
  intl: any
  # shadcn_ui constraint below was written by `flutter pub add` so it records the
  # real resolved range (not a placeholder), satisfying FR-012.
  shadcn_ui: ^0.54.0
  # Export slice (spec 012): `pdf` generates the PDF artifact (pure Dart — the
  # rendering seam stays Flutter-free); `printing` presents the system print
  # dialog (confined to lib/src/print/ behind a swappable presenter seam);
  # `image` decodes raster bytes to RGBA for PDF embedding (already transitive
  # via pdf, declared direct because we import it). All permissively licensed.
  pdf: ^3.12.0
  printing: ^5.14.3
  image: ^4.3.0
  # Barcode/QR encoding (spec 036). Pure Dart, Apache-2.0, by the same author as
  # `pdf` (already a transitive dep via pdf). Isolated to package_barcode_encoder.dart.
  barcode: ^2.2.9
  # vector_math is a direct transitive dep of `pdf`; declared here because
  # pdf_painter.dart imports it directly for Matrix4 PDF transforms (Task 8).
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # Enables the gen-l10n pipeline (driven by l10n.yaml) so `flutter pub get`
  # regenerates JetPrintLocalizations from the ARB files under
  # lib/src/designer/l10n/. With synthetic-package:false the output is real,
  # exportable source — see l10n.yaml.
  generate: true
